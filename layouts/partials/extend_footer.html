<div id="link-preview"></div>

<script>
(() => {
  const preview = document.getElementById('link-preview');
  const cache = new Map();
  let hideTimer = null;

  function repoPath(href) {
    const m = href.match(/^https?:\/\/github\.com\/([^\/]+\/[^\/?#]+)/);
    return m ? m[1].replace(/\/+$/, '') : null;
  }

  function show(el, path) {
    preview.className = 'visible';
    let data = cache.get(path);
    if (data) {
      render(data);
      position(el);
      return;
    }
    preview.innerHTML = '<div class="lp-loading">Loading...</div>';
    position(el);
    fetch('https://api.github.com/repos/' + path)
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => {
        const item = {
          name: d.full_name,
          desc: d.description || '',
          stars: d.stargazers_count,
          lang: d.language,
          langColor: ''
        };
        cache.set(path, item);
        render(item);
        position(el);
      })
      .catch(() => {
        const fallback = { name: path, desc: '', stars: null, lang: null, langColor: '' };
        cache.set(path, fallback);
        render(fallback);
        position(el);
      });
  }

  function render(d) {
    const starHtml = d.stars !== null
      ? `<span class="lp-stars">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.192L.82 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>
          ${d.stars}
        </span>`
      : '';
    const langHtml = d.lang
      ? `<span class="lp-lang"><span class="lp-lang-dot"></span>${d.lang}</span>`
      : '';
    preview.innerHTML =
      `<div class="lp-name">${d.name}</div>` +
      (d.desc ? `<div class="lp-desc">${esc(d.desc)}</div>` : '') +
      ((d.stars !== null || d.lang) ? `<div class="lp-meta">${starHtml}${langHtml}</div>` : '');
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function position(el) {
    const rect = el.getBoundingClientRect();
    const pRect = preview.getBoundingClientRect();
    const gap = 8;
    let top = rect.bottom + gap;
    let left = rect.left;
    if (top + pRect.height > window.innerHeight - gap) {
      top = rect.top - pRect.height - gap;
    }
    if (left + pRect.width > window.innerWidth - gap) {
      left = window.innerWidth - pRect.width - gap;
    }
    if (left < gap) left = gap;
    if (top < gap) top = gap;
    preview.style.top = top + 'px';
    preview.style.left = left + 'px';
  }

  function hide() {
    preview.className = '';
  }

  document.querySelectorAll('.md-content a[href*="github.com"]').forEach(a => {
    const path = repoPath(a.href);
    if (!path) return;
    a.addEventListener('mouseenter', function(e) {
      clearTimeout(hideTimer);
      show(this, path);
    });
    a.addEventListener('mouseleave', function() {
      hideTimer = setTimeout(hide, 200);
    });
    a.addEventListener('mousemove', function() {
      if (preview.className === 'visible') position(this);
    });
  });

  preview.addEventListener('mouseenter', () => clearTimeout(hideTimer));
  preview.addEventListener('mouseleave', () => hide());
})();
</script>
